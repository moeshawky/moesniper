name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build x86_64 wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sniper-py
          target: x86_64-unknown-linux-gnu
          args: --release --out dist
          manylinux: auto
          before-script-linux: "yum install -y python3-devel || apt-get update && apt-get install -y python3-dev || true"
      - name: Upload x86_64 wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-x86_64
          path: sniper-py/dist/*.whl

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build aarch64 wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sniper-py
          target: aarch64-unknown-linux-gnu
          args: --release --out dist
          manylinux: auto
          before-script-linux: "yum install -y python3-devel || apt-get update && apt-get install -y python3-dev || true"
      - name: Upload aarch64 wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-aarch64
          path: sniper-py/dist/*.whl

  testpypi:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/moesniper
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@v4
      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ --token ${{ secrets.TEST_PYPI_TOKEN }} dist/*.whl

  pypi:
    needs: testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/moesniper
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@v4
      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }} dist/*.whl
