name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  testpypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/moesniper
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sniper-py
          target: x86_64
          args: --release --out dist
      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*.whl

  pypi:
    needs: testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/moesniper
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sniper-py
          target: x86_64
          args: --release --out dist
      - name: Publish to PyPI
        run: uv publish dist/*.whl
